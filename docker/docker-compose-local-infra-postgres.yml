services:
  postgresql:
    container_name: postgres
    image: postgres:17
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:${DB_PORT:-5432}"
      - "[::1]:${DB_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-flowintel}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-your_secure_password_here}
      - POSTGRES_DB=${DB_NAME:-flowintel}
    networks:
      - net
    restart: unless-stopped

  valkey:
    container_name: valkey
    image: valkey/valkey
    # We need to expose to host because Flowintel is not containerised
    ports:
      - "127.0.0.1:${VALKEY_PORT:-6379}:${VALKEY_PORT:-6379}"
      - "[::1]:${VALKEY_PORT:-6379}:${VALKEY_PORT:-6379}"
    #
    volumes:
      - valkey-data:/data
    networks:
      - net

volumes:
  db:
  valkey-data:

networks:
  net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.0.0.0/24
        - subnet: fd31:50:0:1::/64