
{% extends 'base.html' %}

{% block head %}
<title>Calendar - {{ config.APP_NAME }}</title>
{{ super() }}

<script src="{{ url_for('static',filename='js/vendor/calendar/fullcalendar.global.min.js') }}"></script>

<script src="{{ url_for('static',filename='js/vendor/calendar/flatpickr.min.js') }}"></script>
<script src="{{ url_for('static',filename='js/vendor/calendar/flatpickr-monthSelect.js') }}"></script>
<link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='css/vendor/calendar/flatpickr.min.css') }}">
<link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='css/vendor/calendar/flatpickr-monthSelect.css') }}">
<link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='css/calendar_custom.css') }}">
{%endblock%}

{% block content %}

<div>
    <!-- Modal -->
    <div class="modal fade" id="modal_task" tabindex="-1" aria-labelledby="modal_task_label" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content calendar-event-modal-content">
            <div class="modal-header calendar-event-modal-header">
                <h5 class="modal-title" id="modal_task_label">Modal title</h5>
                <div id="status_modal" class="calendar-event-status"></div>
                <button type="button" class="btn-close" aria-label="Close" @click="closeModal"></button>
            </div>
            <div class="modal-body calendar-event-modal-body" id="modal_body">
                ...
            </div>
            <div class="modal-footer calendar-event-modal-footer">
                <button type="button" class="btn btn-secondary" @click="closeModal">Close</button>
                <a type="button" class="btn btn-primary" id="see_case">See case</a>
            </div>
            </div>
        </div>
    </div>


    <div class="card card-body" style="margin-bottom: 10px;">
        <div class="d-flex w-100 justify-content-evenly">
            <div>
                <div class="form-check">
                    <input class="form-check-input" checked type="checkbox" value="" id="checkbox-case" @click="selection_case_task(true, false)">
                    <label class="form-check-label" for="checkbox-case">
                        Case
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" checked type="checkbox" value="" id="checkbox-task" @click="selection_case_task(false, true)">
                    <label class="form-check-label" for="checkbox-task">
                        Task
                    </label>
                </div>
            </div>

            <div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioOther" id="radioDeadLine" @click="select_dead_filter()" checked>
                    <label class="form-check-label" for="radioDeadLine">Deadline</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioOther" id="radioCreation" @click="select_creation_filter()">
                    <label class="form-check-label" for="radioCreation">Creation</label>
                </div>
            </div>

            <div>
                <button class="btn btn-sm btn-primary" @click="downloadCalendarFeed">
                    <i class="fa-solid fa-calendar-plus me-1"></i>Download Calendar Feed
                </button>
            </div>
        </div>
    </div>

    <input id="monthPicker" class="form-control start-50 translate-middle-x mb-2 mt-3" placeholder="Select month" style="text-align: center; position: relative;">

    <div id="calendar" class="case-core-style"></div>

</div>
{% endblock %}


{% block script %}
<script type="module">
    const { createApp, ref, nextTick, onMounted } = Vue
    import {message_list} from '/static/js/toaster.js'
    import { getTextColor, mapIcon } from '/static/js/utils.js'
    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            const tasks = ref(null)
            const cases = ref(null)
            const status_info = ref(null)
            let is_case_selected = true
            let is_task_selected = true
            let flag_dead_creation = true
            let modal_task = null

            var calendar


            async function fetch_task_calendar(current_month, flag_dead_creation_loc=true) {
                tasks.value = null
                const res = await fetch(
                    'get_task_month?date=' + current_month + "&dead_creation=" + flag_dead_creation_loc
                )
                let loc = await res.json()
                tasks.value = loc["tasks"]

                let loc_var
                for (let i=0; i<tasks.value.length; i++){
                    if(flag_dead_creation_loc) loc_var = tasks.value[i]["deadline"]
                    else loc_var = tasks.value[i]["creation_date"]

                    calendar.addEvent({
                        id: tasks.value[i]["id"],
                        start: date_parser(loc_var, true),
                        allDay: true,
                        color: "rgb(32, 181, 32)",
                        title: tasks.value[i]["title"],
                        extendedProps: {
                            toJson: tasks.value[i]
                        }
                    })
                }
            }

            async function fetch_case_calendar(current_month, flag_dead_creation_loc=true){
                cases.value = null
                const res = await fetch(
                    'get_case_month?date=' + current_month + "&dead_creation=" + flag_dead_creation_loc
                )
                let loc = await res.json()
                cases.value = loc["cases"]

                let loc_var
                for (let i=0; i<cases.value.length; i++){
                    if(flag_dead_creation_loc) loc_var = cases.value[i]["deadline"]
                    else loc_var = cases.value[i]["creation_date"]

                    calendar.addEvent({
                        id: cases.value[i]["id"],
                        start: date_parser(loc_var, true),
                        allDay: true,
                        color: "#3788d8",
                        title: cases.value[i]["title"],
                        extendedProps: {
                            toJson: cases.value[i]
                        }
                    })
                }
            }

            async function fetchStatus(){
                status_info.value = null
                const res = await fetch('/case/get_status')
                status_info.value = await res.json()
            }       

            function openModal(){ modal_task.show() }
            function closeModal(){ modal_task.hide() }

            function date_parser(date, flag_day=false){
                var d = new Date(date),
                    month = '' + (d.getMonth() + 1),
                    year = d.getFullYear();
                    
                if (month.length < 2) 
                    month = '0' + month;

                if(flag_day){
                    var day = '' + d.getDate()
                    if (day.length < 2) 
                        day = '0' + day;
                    return [year, month, day].join('-');
                }

                return [year, month].join('-');
            }

            function selection_case_task(is_case, is_task){
                calendar.removeAllEvents();
                if (is_case) is_case_selected = !is_case_selected
                if (is_task) is_task_selected = !is_task_selected

                if(is_case_selected) fetch_case_calendar(date_parser(calendar.getDate()), flag_dead_creation)
                if(is_task_selected) fetch_task_calendar(date_parser(calendar.getDate()), flag_dead_creation)
            }

            function select_dead_filter(){
                calendar.removeAllEvents();

                if(is_case_selected) fetch_case_calendar(date_parser(calendar.getDate()), true)
                if(is_task_selected) fetch_task_calendar(date_parser(calendar.getDate()), true)
                flag_dead_creation = true
            }

            function select_creation_filter(){
                calendar.removeAllEvents();

                if(is_case_selected) fetch_case_calendar(date_parser(calendar.getDate()), false)
                if(is_task_selected) fetch_task_calendar(date_parser(calendar.getDate()), false)
                flag_dead_creation = false
            }
            
            
            function onDateChange() {
                calendar.removeAllEvents();
            
                if(is_case_selected) fetch_case_calendar(date_parser(calendar.getDate()), flag_dead_creation)
                if(is_task_selected) fetch_task_calendar(date_parser(calendar.getDate()), flag_dead_creation)
            }

            function downloadCalendarFeed() {
                window.location.href = '/calendar/calendar_feed'
            }

            onMounted(() => {
                fetchStatus()

                modal_task = new bootstrap.Modal('#modal_task', {})

                calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                    initialView: 'dayGridMonth',
                    height: 'auto',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,listMonth'
                    },
                    views: {
                        listMonth: {
                            buttonText: 'List'
                        }
                    },
                    eventContent: function(arg) {
                        let arrayOfDomNodes = []

                        let containerEl = document.createElement('div')
                        containerEl.style.cssText = 'display: flex; align-items: center; width: 100%;'

                        let titleEl = document.createElement('span')
                        titleEl.classList.add('fc-event-title')
                        titleEl.style.cssText = 'flex: 1; font-size: 0.88rem; margin-left: 4px;'
                        titleEl.innerHTML = arg.event.title

                        let downloadEl = document.createElement('a')
                        downloadEl.innerHTML = '<i class="fa-solid fa-download"></i>'
                        downloadEl.classList.add('fc-event-download')
                        downloadEl.style.cssText = 'margin-left: 8px; color: inherit; cursor: pointer; flex-shrink: 0;'
                        downloadEl.title = 'Download ICS'

                        if (arg.event.extendedProps && arg.event.extendedProps.toJson) {
                            if (arg.event.extendedProps.toJson.case_id) {
                                downloadEl.href = '/calendar/download_task_ics/' + arg.event.extendedProps.toJson.id
                            } else {
                                downloadEl.href = '/calendar/download_case_ics/' + arg.event.extendedProps.toJson.id
                            }
                        }

                        downloadEl.addEventListener('click', function(e) {
                            e.stopPropagation() // Prevent opening the modal
                        })

                        containerEl.appendChild(titleEl)
                        containerEl.appendChild(downloadEl)
                        arrayOfDomNodes.push(containerEl)

                        return { domNodes: arrayOfDomNodes }
                    },
                    datesSet: function(info) {
                        onDateChange();
                    },
                    eventClick: function(info) {
                        const d = info.event.extendedProps.toJson
                        $("#modal_task_label").text(d.title).css("margin-right", "5px")
                        $("#status_modal").empty()
                        if (d.status_id && status_info.value && status_info.value.status){
                            const s = status_info.value.status.find(st => st.id === d.status_id)
                            if (s) {
                                $("#status_modal").append(
                                    $("<span>").attr({"class": "badge rounded-pill text-bg-"+s.bootstrap_style}).text(s.name)
                                )
                            }
                        }

                        // Build details block
                        $("#modal_body").empty()

                        let details = $("<div>").addClass("calendar-event-details")

                        const makeSection = (title, contentNode) => {
                            let section = $("<div>").addClass("calendar-section")
                            section.append($("<div>").addClass("calendar-section-title").text(title))
                            section.append($("<div>").addClass("calendar-section-content").append(contentNode))
                            return section
                        }

                        const makeMetaItem = (label, value) => {
                            let item = $("<div>").addClass("calendar-meta-item")
                            item.append($("<span>").addClass("calendar-meta-label").text(label))
                            item.append($("<span>").addClass("calendar-meta-value").text(value || '—'))
                            return item
                        }

                        const makeMetricItem = (label, value, iconClass='fa-solid fa-square') => {
                            let item = $("<div>").addClass("calendar-metric-item")
                            let labelEl = $("<span>").addClass("calendar-metric-label")
                            labelEl.append($("<i>").addClass(iconClass + " calendar-metric-icon"))
                            labelEl.append(document.createTextNode(' ' + label))
                            item.append(labelEl)
                            item.append($("<strong>").text(String(value || 0)))
                            return item
                        }

                        const makeInfoRow = (label, valueNode) => {
                            let row = $("<div>").addClass("calendar-info-row")
                            row.append($("<span>").addClass("calendar-info-label").text(label))
                            let valueEl = $("<span>").addClass("calendar-info-value")
                            if (valueNode && valueNode.jquery) {
                                valueEl.append(valueNode)
                            } else {
                                valueEl.text(valueNode || '—')
                            }
                            row.append(valueEl)
                            return row
                        }

                        let metaGrid = $("<div>").addClass("calendar-meta-grid")
                        metaGrid.append(makeMetaItem('Creation', d.creation_date))
                        metaGrid.append(makeMetaItem('Last modified', d.last_modif))
                        metaGrid.append(makeMetaItem('Deadline', d.deadline))
                        details.append(metaGrid)

                        // Tags
                        if (d.tags && d.tags.length){
                            let tagsContainer = $("<div>").addClass("calendar-pill-list")
                            d.tags.forEach(t => {
                                try {
                                    let color = t.color || '#777'
                                    let tagEl = $("<div>").addClass('tag').attr('title', t.description || '')
                                    tagEl.css({"background-color": color, "color": getTextColor(color), "padding": "4px 9px", "border-radius": "999px", "display": "inline-flex", "align-items": "center", "gap": "6px", "font-weight": "600"})
                                    if (t.icon) {
                                        tagEl.append($("<i>").addClass(t.icon))
                                    }
                                    tagEl.append($("<span>").html('<i class="fa-solid fa-tag" style="margin-left: 3px;"></i>'))
                                    tagEl.append(document.createTextNode(t.name || t))
                                    tagsContainer.append(tagEl)
                                } catch (e) {
                                    // fallback
                                    tagsContainer.append($("<span>").addClass('badge bg-secondary me-1').text(t.name || t))
                                }
                            })
                            details.append(makeSection('Tags', tagsContainer))
                        }

                        // Custom tags
                        if (d.custom_tags && d.custom_tags.length) {
                            let customContainer = $("<div>").addClass("calendar-pill-list")
                            d.custom_tags.forEach(ct => {
                                try {
                                    let color = ct.color || '#777'
                                    let ctEl = $("<div>").addClass('tag').attr('title', ct.description || '')
                                    ctEl.css({"background-color": color, "color": getTextColor(color), "padding": "4px 9px", "border-radius": "999px", "display": "inline-flex", "align-items": "center", "gap": "6px", "font-weight": "600"})
                                    if (ct.icon) {
                                        ctEl.append($("<i>").addClass(ct.icon))
                                    }
                                    ctEl.append(document.createTextNode(ct.name || ct))
                                    customContainer.append(ctEl)
                                } catch (e) {
                                    customContainer.append($("<span>").addClass('badge bg-secondary me-1').text(ct.name || ct))
                                }
                            })
                            details.append(makeSection('Custom tags', customContainer))
                        }

                        let metricGrid = $("<div>").addClass("calendar-metric-grid")

                        // Case-specific info
                        if (!d.case_id) {
                            // case
                            if (typeof d.nb_tasks !== 'undefined')
                                metricGrid.append(makeMetricItem('Tasks', d.nb_tasks, 'fa-solid fa-list-check'))
                            if (typeof d.nb_objects !== 'undefined')
                                metricGrid.append(makeMetricItem('MISP objects', d.nb_objects, 'fa-solid fa-cubes'))
                            if (typeof d.nb_standalone_attrs !== 'undefined')
                                metricGrid.append(makeMetricItem('Standalone attributes', d.nb_standalone_attrs, 'fa-solid fa-fingerprint'))
                            if (typeof d.nb_connectors !== 'undefined')
                                metricGrid.append(makeMetricItem('Connectors', d.nb_connectors, 'fa-solid fa-plug'))
                            if (typeof d.nb_files !== 'undefined') {
                                metricGrid.append(makeMetricItem('Files', d.nb_files, 'fa-solid fa-file'))
                                if (typeof d.nb_case_files !== 'undefined') {
                                    metricGrid.append(makeMetricItem('Case files', d.nb_case_files, 'fa-solid fa-folder-open'))
                                }
                                if (typeof d.nb_task_files !== 'undefined') {
                                    metricGrid.append(makeMetricItem('Task files', d.nb_task_files, 'fa-solid fa-file-lines'))
                                }
                            }

                            if (metricGrid.children().length) {
                                details.append(makeSection('Case metrics', metricGrid))
                            }
                        } else {
                            // task
                            let taskInfo = $("<div>").addClass("calendar-info-list")
                            taskInfo.append(
                                makeInfoRow(
                                    'Case',
                                    $("<a>").attr("href", "/case/" + d.case_id).text(String(d.case_id))
                                )
                            )
                            if (typeof d.nb_notes !== 'undefined')
                                taskInfo.append(makeInfoRow('Notes', String(d.nb_notes || (d.notes? d.notes.length : 0))))
                            if (d.urls_tools && d.urls_tools.length)
                                taskInfo.append(makeInfoRow('URLs/Tools', d.urls_tools.map(u => u.name).join(', ')))

                            details.append(makeSection('Task details', taskInfo))
                        }

                        // Clusters (render like in case_tasks.js)
                        if (d.clusters && d.clusters.length) {
                            let clustersContainer = $("<div>").addClass("calendar-pill-list")
                            d.clusters.forEach(c => {
                                try {
                                    let clEl = $("<div>").addClass("cluster").attr('title', 'Description:\n' + (c.description || '') + '\n\nMetadata:\n' + (c.meta || ''))
                                    clEl.append($("<span>").html(mapIcon(c.icon)))
                                    clEl.append(document.createTextNode(' ' + (c.tag || c.name || '')))
                                    clustersContainer.append(clEl)
                                } catch (e) {
                                    clustersContainer.append($("<span>").text(c.tag || c.name || ''))
                                }
                            })
                            details.append(makeSection('Clusters', clustersContainer))
                        }

                        // Description
                        details.append(
                            makeSection(
                                'Description',
                                $("<pre>").attr({"class": "description"}).text(d.description || 'No description')
                            )
                        )

                        $("#modal_body").append(details)

                        // type badge
                        $("#status_modal").prepend(
                            $("<span>").addClass("modal-type-badge "+(d.case_id?"task":"case")).text(d.case_id?"Task":"Case")
                        )

                        // See case link
                        if(d.case_id)
                            $("#see_case").attr("href", "/case/" + d.case_id)
                        else
                            $("#see_case").attr("href", "/case/" + d.id)

                        openModal()
                    }
                });

                calendar.render();

                flatpickr("#monthPicker", {
                    dateFormat: "Y-m",   // year-month
                    plugins: [
                        new monthSelectPlugin({
                            shorthand: true,      // Jan, Feb, ...
                            dateFormat: "Y-m",
                            altFormat: "F Y"
                        })
                    ],
                    onChange: function(selectedDates) {
                        if (selectedDates.length > 0) {
                            const date = selectedDates[0];
                            calendar.gotoDate(date); // Jump to selected month
                        }
                    }
                });
            })


            return {
                message_list,
                openModal, closeModal, select_dead_filter, select_creation_filter, selection_case_task, downloadCalendarFeed
            }
        }
    }).mount('#main-container')

</script>

{% endblock %}
