{% extends 'base.html' %}

{% block head %}
<script src="{{ url_for('static',filename='js/vendor/markdown-it.min.js') }}"></script>
<script src="{{ url_for('static',filename='js/vendor/codemirror.js') }}"></script>
<script src="{{ url_for('static',filename='js/note_variable_completions.js') }}"></script>
<script src="{{ url_for('static',filename='js/mermaid-markdown.js') }}"></script>

{{ super() }}
{%endblock%}

{% block content %}
    <div class="case-core-style" style="border-radius: 0;">
        <div class="row align-items-center">
            <div class="col-auto">
                <h5 class="mb-0"><i class="fa-solid fa-note-sticky me-2"></i>Create a note template</h5>
            </div>
        </div>
    </div>
<hr class="fading-line-2 mt-4 mb-4">

<div class="row">
    <div class="mb-3 w-50">
        <label for="title-input" class="col-form-label">Title:<span class="text-danger ms-1">*</span></label>
        <input class="form-control" type="text" id="title-input" v-model="title" required>
    </div>
    <div class="mb-3 w-50">
        <label for="description-input" class="col-form-label">Description:</label>
        <input class="form-control" type="text" id="description-input" v-model="description">
    </div>
</div>

<label class="col-form-label">Content:<span class="text-danger ms-1">*</span></label>
<div style="display: flex;">
    <div style="background-color: white; border: 1px rgb(159, 159, 159) solid; width: 50%" id="editor"></div>
    <div style="background-color: white; border: 1px rgb(159, 159, 159) solid; padding: 5px; width: 50%" v-html="md.render(note_editor_render)"></div>
</div>

<button class="btn btn-primary mt-3"
        :disabled="!can_submit"
        :title="can_submit ? 'Submit' : 'Title and content are required'"
        @click="submit">Submit</button>
{% endblock %}


{% block script %}
<script type="module">
    const { createApp, onMounted, ref, computed } = Vue
    import {message_list, display_toast} from '/static/js/toaster.js'
    const { EditorView, basicSetup, languages } = window.CodeMirrorBundle;

    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            let editor
            const title = ref("")
            const description = ref("")
            const note_editor_render = ref("")

            const md = window.markdownit()			// Library to Parse and display markdown
		    md.use(mermaidMarkdown.default)			// Use mermaid library

            const can_submit = computed(() =>
                title.value.trim() !== "" && note_editor_render.value.trim() !== ""
            )

            async function submit() {
                if(!can_submit.value){
                    display_toast({message: 'Title and content are required', toast_class: 'warning-subtle'})
                    return
                }

                const res_msg = await fetch(
                    '/tools/create_note_template',{
                        headers: { "X-CSRFToken": $("#csrf_token").val(), "Content-Type": "application/json" },
                        method: "POST",
                        body: JSON.stringify({"title": title.value, "description": description.value || "", "content": note_editor_render.value})
                    }
                )
                if(await res_msg.status == 201){
                    window.location.href="/tools/note_template_index"
                }else{
                    display_toast(res_msg)
                }
            }

            onMounted(() => {
                const targetElement = document.getElementById('editor')
                if(targetElement && targetElement.innerHTML === ""){
                        editor = new EditorView({
                            doc: "",
                            extensions: [basicSetup, languages.markdown(),
                                ...(window.FlowintelVarComplete ? [FlowintelVarComplete.extension()] : []),
                                EditorView.lineWrapping,
                                EditorView.theme({
                                    '&': { height: '220px' },
                                    '.cm-scroller': { overflow: 'auto' }
                                }),
                                EditorView.updateListener.of((v) => {
                                    if (v.docChanged) {
                                        note_editor_render.value = editor.state.doc.toString()
                                    }
                                })],
                            parent: targetElement
                        })
                }
                md.mermaid.init()
            })

            return {
                message_list,
                md,
                title,
                description,
                note_editor_render,
                can_submit,
                submit
            }
        }
    }).mount('#main-container')

</script>
{% endblock %}
