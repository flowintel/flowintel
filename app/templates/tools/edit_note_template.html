{% extends 'base.html' %}

{% block content %}
    <div class="case-core-style" style="border-radius: 0;">
        <div class="row align-items-center">
            <div class="col-auto">
                <h5 class="mb-0"><i class="fa-solid fa-note-sticky me-2"></i>Edit a note template</h5>
            </div>
        </div>
    </div>
    <hr class="fading-line-2 mt-4 mb-4">

    <div class="case-core-style">
        <div class="mb-3">
            <label class="col-form-label">Title:</label>
            <input v-model="title" class="form-control" placeholder="Title">
        </div>
        
        <div class="mb-3">
            <label class="col-form-label">Description:</label>
            <textarea v-model="description" class="form-control" rows="3" placeholder="Description"></textarea>
        </div>

        <div class="d-flex gap-2" style="margin-top: 10px;">
            <a href="{{ url_for('tools.note_template_index') }}" class="btn btn-secondary">Cancel</a>
            <button class="btn btn-primary" @click="submit_form()">Save</button>
        </div>
    </div>
{% endblock %}


{% block script %}
<script type="module">
    // @ts-nocheck
    const { createApp, ref } = Vue
    import {message_list, display_toast} from '/static/js/toaster.js'
    
    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            const title = ref("{{ note_template.title }}")
            const description = ref("{{ note_template.description or '' }}")
            const note_id = {{ note_template.id }}

            async function submit_form() {
                const res = await fetch('/tools/note_template/' + note_id + '/edit', {
                    headers: { 
                        "X-CSRFToken": $("#csrf_token").val(), 
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({
                        "title": title.value,
                        "description": description.value
                    })
                })

                if (res.status == 200) {
                    window.location.href = '/tools/note_template_index'
                } else {
                    display_toast(res)
                }
            }

            return {
                message_list,
                title,
                description,
                submit_form
            }
        }
    }).mount('#main-container')
</script>
{% endblock %}
