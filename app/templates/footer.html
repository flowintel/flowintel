<footer class="site-footer" style="font-size: 0.8rem;">
    <div class="container-fluid px-4">
        <div class="row align-items-center">
            <div class="col">
                <div class="d-flex justify-content-start align-items-center gap-3 text-muted">
                    <small>Flowintel v[[version]]</small>
                    <a href="https://flowintel.github.io/flowintel-doc/" class="text-muted text-decoration-none" style="font-size: 0.8rem;">
                        <i class="fa-solid fa-book me-1"></i>Documentation
                    </a>
                    <a href="/api/" class="text-muted text-decoration-none" style="font-size: 0.8rem;">
                        <i class="fa-solid fa-code me-1"></i>API
                    </a>
                    <a href="https://github.com/flowintel/flowintel" class="text-muted">
                        <i class="fa-brands fa-github fa-lg"></i>
                    </a>
                </div>
            </div>
            <div class="col-auto">
                <div class="d-flex align-items-center gap-4">
                    {% if config.FOOTER_1_LOGO %}
                    <img src="{{ config.FOOTER_1_LOGO }}" alt="Partner logo 1" style="max-height: 40px; height: auto;" loading="lazy" />
                    {% endif %}
                    {% if config.FOOTER_2_LOGO %}
                    <img src="{{ config.FOOTER_2_LOGO }}" alt="Partner logo 2" style="max-height: 40px; height: auto; margin-right: 12px;" loading="lazy" />
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</footer>

<script type="module">
	const { createApp, ref, onMounted } = Vue
	import {display_toast, message_list} from '/static/js/toaster.js'

	createApp({
		delimiters: ['[[', ']]'],
		setup() {
			const version = ref(null)

			async function fetchVersion() {
                const res = await fetch("/version")
                let loc = await res.json()
                version.value = loc["version"]
                
            }
            fetchVersion()

			return {
				version
			}
		}
	}).mount('.site-footer')
</script>
